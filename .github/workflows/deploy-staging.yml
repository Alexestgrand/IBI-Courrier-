name: Déploiement staging

on:
  push:
    branches: [staging]
    paths:
      - "ibi-courriers-web/**"
      - ".github/workflows/deploy-staging.yml"

  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  test-backend:
    name: Tests API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r ibi-courriers-web/backend/requirements-dev.txt

      - name: Lancer pytest
        working-directory: ibi-courriers-web/backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: test-secret-key
          ENVIRONMENT: development
          UPLOAD_DIR: /tmp/ibi-ci-uploads
          BACKUP_DIR: /tmp/ibi-ci-backups
          MIGRATION_DIR: /tmp/ibi-ci-migration
        run: PYTHONPATH=. pytest tests/ -q

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        working-directory: ibi-courriers-web/frontend
        run: npm ci && npm run build

  deploy-staging:
    name: Déployer staging VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Choisir le mode de déploiement
        run: |
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ] && [ -n "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" ]; then
            echo "DEPLOY_MODE=webhook" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_USER }}" ] && [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "DEPLOY_MODE=ssh" >> "$GITHUB_ENV"
          else
            exit 1
          fi

      - name: Déployer staging via webhook
        if: env.DEPLOY_MODE == 'webhook'
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          chmod +x ibi-courriers-web/scripts/github-deploy-webhook.sh
          BODY='{"source":"github-actions","ref":"${{ github.sha }}","branch":"staging","compose_file":"docker-compose.staging.yml","health_url":"http://127.0.0.1:8081/api/health"}'
          ibi-courriers-web/scripts/github-deploy-webhook.sh "$BODY"

      - name: Configurer SSH
        if: env.DEPLOY_MODE == 'ssh'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Déployer staging via SSH
        if: env.DEPLOY_MODE == 'ssh'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" << 'ENDSSH'
          set -euo pipefail
          cd ~/IBI-Courrier-
          git fetch origin staging
          git reset --hard origin/staging
          cd ibi-courriers-web
          export DEPLOY_BRANCH=staging
          export DEPLOY_COMPOSE_FILE=docker-compose.staging.yml
          export DEPLOY_HEALTH_URL=http://127.0.0.1:8081/api/health
          chmod +x scripts/deploy.sh scripts/wait-health.sh 2>/dev/null || true
          ./scripts/deploy.sh
          echo "Staging déployé sur port 8081"
          ENDSSH
