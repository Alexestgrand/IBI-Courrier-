name: Déploiement staging

on:
  push:
    branches: [staging]
    paths:
      - "ibi-courriers-web/**"
      - ".github/workflows/deploy-staging.yml"

  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  test-backend:
    name: Tests API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r ibi-courriers-web/backend/requirements.txt

      - name: Lancer pytest
        working-directory: ibi-courriers-web/backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: test-secret-key
          ENVIRONMENT: development
          UPLOAD_DIR: /tmp/ibi-ci-uploads
          BACKUP_DIR: /tmp/ibi-ci-backups
          MIGRATION_DIR: /tmp/ibi-ci-migration
        run: PYTHONPATH=. pytest tests/ -q

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        working-directory: ibi-courriers-web/frontend
        run: npm ci && npm run build

  deploy-staging:
    name: Déployer staging VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-backend, build-frontend]

    steps:
      - name: Vérifier les secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "Secret VPS_HOST manquant"; exit 1; fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then echo "Secret VPS_USER manquant"; exit 1; fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then echo "Secret VPS_SSH_KEY manquant"; exit 1; fi

      - name: Configurer SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Déployer staging
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" << 'ENDSSH'
          set -euo pipefail
          cd ~/IBI-Courrier-
          git fetch origin staging
          git reset --hard origin/staging
          cd ibi-courriers-web
          chmod +x scripts/wait-health.sh 2>/dev/null || true
          docker compose -f docker-compose.staging.yml up -d --build
          docker compose -f docker-compose.staging.yml ps
          ./scripts/wait-health.sh http://127.0.0.1:8081/api/health
          echo "Staging déployé sur port 8081"
          ENDSSH
