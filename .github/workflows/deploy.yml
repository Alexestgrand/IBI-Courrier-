name: Déploiement production

on:
  push:
    branches: [main]
    paths:
      - "ibi-courriers-web/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test-backend:
    name: Tests API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r ibi-courriers-web/backend/requirements-dev.txt

      - name: Lancer pytest
        working-directory: ibi-courriers-web/backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: test-secret-key
          ENVIRONMENT: development
          UPLOAD_DIR: /tmp/ibi-ci-uploads
          BACKUP_DIR: /tmp/ibi-ci-backups
          MIGRATION_DIR: /tmp/ibi-ci-migration
        run: PYTHONPATH=. pytest tests/ -q

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        working-directory: ibi-courriers-web/frontend
        run: npm ci && npm run build

  deploy:
    name: Déployer sur VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Détecter les méthodes de déploiement
        run: |
          HAS_WEBHOOK=false
          HAS_SSH=false
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ] && [ -n "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" ]; then
            HAS_WEBHOOK=true
            echo "Webhook HTTPS : oui"
          fi
          if [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_USER }}" ] && [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            HAS_SSH=true
            echo "SSH : oui"
          fi
          if [ "$HAS_WEBHOOK" = false ] && [ "$HAS_SSH" = false ]; then
            echo "Configurer DEPLOY_WEBHOOK_URL + DEPLOY_WEBHOOK_SECRET et/ou VPS_HOST + VPS_USER + VPS_SSH_KEY"
            exit 1
          fi
          echo "HAS_WEBHOOK=$HAS_WEBHOOK" >> "$GITHUB_ENV"
          echo "HAS_SSH=$HAS_SSH" >> "$GITHUB_ENV"

      - name: Déployer via webhook HTTPS
        if: env.HAS_WEBHOOK == 'true'
        id: webhook
        continue-on-error: true
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          chmod +x ibi-courriers-web/scripts/github-deploy-webhook.sh
          BODY='{"source":"github-actions","ref":"${{ github.sha }}","branch":"main"}'
          ibi-courriers-web/scripts/github-deploy-webhook.sh "$BODY"

      - name: Configurer SSH
        if: steps.webhook.outcome == 'failure' || (env.HAS_WEBHOOK == 'false' && env.HAS_SSH == 'true')
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Tester la connectivité SSH
        if: steps.webhook.outcome == 'failure' || (env.HAS_WEBHOOK == 'false' && env.HAS_SSH == 'true')
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "Test port 22 (timeout 15s) :"
          nc -zv -w 15 "${VPS_HOST}" 22

      - name: Déployer via SSH
        if: (steps.webhook.outcome == 'failure' || env.HAS_WEBHOOK == 'false') && env.HAS_SSH == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          if [ "${{ steps.webhook.outcome }}" = "failure" ]; then
            echo "Webhook en échec — bascule SSH"
          fi
          SSH_OPTS="-i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
          for attempt in 1 2 3; do
            echo "Tentative SSH ${attempt}/3..."
            if ssh ${SSH_OPTS} "${VPS_USER}@${VPS_HOST}" << 'ENDSSH'
          set -euo pipefail
          cd ~/IBI-Courrier-
          git fetch origin main
          git reset --hard origin/main
          cd ibi-courriers-web
          chmod +x scripts/deploy.sh scripts/backup.sh scripts/wait-health.sh scripts/install-deploy-webhook.sh 2>/dev/null || true
          ./scripts/deploy.sh
          echo "Déploiement GitHub Actions OK"
          ENDSSH
            then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Échec SSH, nouvel essai dans 45s..."
              sleep 45
            fi
          done
          echo "SSH impossible — voir deploy/DEPLOY.md (webhook 502 : systemctl restart ibi-deploy-webhook)"
          exit 1

      - name: Échec si webhook KO sans secours SSH
        if: always() && steps.webhook.outcome == 'failure' && env.HAS_SSH != 'true'
        run: |
          echo "Webhook en échec et SSH non configuré"
          exit 1
