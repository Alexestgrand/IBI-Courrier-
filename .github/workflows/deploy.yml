name: Déploiement production

on:
  push:
    branches: [main]
    paths:
      - "ibi-courriers-web/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test-backend:
    name: Tests API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r ibi-courriers-web/backend/requirements-dev.txt

      - name: Lancer pytest
        working-directory: ibi-courriers-web/backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: test-secret-key
          ENVIRONMENT: development
          UPLOAD_DIR: /tmp/ibi-ci-uploads
          BACKUP_DIR: /tmp/ibi-ci-backups
          MIGRATION_DIR: /tmp/ibi-ci-migration
        run: PYTHONPATH=. pytest tests/ -q

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        working-directory: ibi-courriers-web/frontend
        run: npm ci && npm run build

  deploy:
    name: Déployer sur VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Choisir le mode de déploiement
        run: |
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ] && [ -n "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" ]; then
            echo "DEPLOY_MODE=webhook" >> "$GITHUB_ENV"
            echo "Mode webhook HTTPS (recommandé)"
          elif [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_USER }}" ] && [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "DEPLOY_MODE=ssh" >> "$GITHUB_ENV"
            echo "Mode SSH (secours)"
          else
            echo "Configurer DEPLOY_WEBHOOK_URL + DEPLOY_WEBHOOK_SECRET (recommandé)"
            echo "ou VPS_HOST + VPS_USER + VPS_SSH_KEY"
            exit 1
          fi

      - name: Déployer via webhook HTTPS
        if: env.DEPLOY_MODE == 'webhook'
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          chmod +x ibi-courriers-web/scripts/github-deploy-webhook.sh
          BODY='{"source":"github-actions","ref":"${{ github.sha }}","branch":"main"}'
          ibi-courriers-web/scripts/github-deploy-webhook.sh "$BODY"

      - name: Configurer SSH
        if: env.DEPLOY_MODE == 'ssh'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Tester la connectivité SSH
        if: env.DEPLOY_MODE == 'ssh'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "Test port 22 (timeout 15s) :"
          nc -zv -w 15 "${VPS_HOST}" 22

      - name: Déployer via SSH
        if: env.DEPLOY_MODE == 'ssh'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
          for attempt in 1 2 3; do
            echo "Tentative SSH ${attempt}/3..."
            if ssh ${SSH_OPTS} "${VPS_USER}@${VPS_HOST}" << 'ENDSSH'
          set -euo pipefail
          cd ~/IBI-Courrier-
          git fetch origin main
          git reset --hard origin/main
          cd ibi-courriers-web
          chmod +x scripts/deploy.sh scripts/backup.sh scripts/wait-health.sh 2>/dev/null || true
          ./scripts/deploy.sh
          echo "Déploiement GitHub Actions OK"
          ENDSSH
            then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Échec SSH, nouvel essai dans 45s..."
              sleep 45
            fi
          done
          echo "SSH impossible — préférer le webhook HTTPS (voir deploy/DEPLOY.md)"
          exit 1
