services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ibi
      POSTGRES_PASSWORD: ibi_secret
      POSTGRES_DB: ibi_courriers
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibi -d ibi_courriers"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ibi:ibi_secret@db:5432/ibi_courriers
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
